    .wrapper {
      position: relative;

      height: 720px;

    }

    .layer {

      width: 1024px;

    audio {

  <script>
    function scaleWrapper() {
      const wrapper = document.getElementById('wrapper');
      const container = wrapper.parentElement;

      const designWidth = 1024;
      const designHeight = 720;

      // Available space
      const availableWidth = container.clientWidth;
      const availableHeight = window.innerHeight - 20; // 10px padding top+bottom

      // Scale to fit both width and height
      const scaleX = availableWidth / designWidth;
      const scaleY = availableHeight / designHeight;
      const scale = Math.min(scaleX, scaleY, 1); // never scale UP beyond 1

      wrapper.style.transform = `scale(${scale})`;

      // Adjust the container height so the page doesn't leave empty space
      const scaledHeight = designHeight * scale;
      container.style.height = scaledHeight + 'px';
    }

    scaleWrapper();
    window.addEventListener('resize', scaleWrapper);
  </script>
